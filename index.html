<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ASIRNET</title>
<!-- Google Fonts for Professional Typography -->

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="icon" href="https://i.ibb.co/67Tcn3S8/IMG-20251216-151652.png">


<style>
    :root {
        --bg-color: #0b1120;
        --primary: #38bdf8;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --glass-bg: rgba(30, 41, 59, 0.4);
        --glass-border: rgba(56, 189, 248, 0.1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        background: radial-gradient(circle at center, #111827 0%, var(--bg-color) 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: var(--text-main);
    }

    /* Glassmorphism Card Container */
    .container {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        padding: 40px 50px;
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 90%;
        max-width: 420px;
        animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* LOGO with Floating Effect */
    .logo-container {
        position: relative;
        margin-bottom: 25px;
    }

    .logo {
        width: 100px;
        height: 100px;
        border-radius: 22px;
        object-fit: cover;
        box-shadow: 0 0 30px rgba(56,189,248,0.4);
        border: 2px solid rgba(56,189,248,0.2);
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    /* TYPOGRAPHY */
    .title {
        font-size: 26px;
        font-weight: 700;
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        margin-bottom: 5px;
    }

    .subtitle {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 35px;
    }

    /* STATUS TEXT & PULSING DOT */
    .status-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        height: 20px; 
    }

    .dot {
        width: 8px;
        height: 8px;
        background-color: var(--primary);
        border-radius: 50%;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(56,189,248,0.7); }
        70% { box-shadow: 0 0 0 10px rgba(56,189,248,0); }
        100% { box-shadow: 0 0 0 0 rgba(56,189,248,0); }
    }

    .status {
        font-size: 14px;
        color: #cbd5e1;
        font-weight: 300;
        letter-spacing: 0.5px;
    }

    /* MODERN PROGRESS BAR */
    .bar-container {
        width: 100%;
        background: #1e293b;
        border-radius: 50px;
        padding: 4px;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }

    .progress {
        height: 6px;
        width: 0%;
        background: linear-gradient(90deg, #38bdf8, #818cf8);
        border-radius: 50px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
        position: relative;
        overflow: hidden;
    }

    .progress::after {
        content: '';
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
        animation: shimmer 1.5s infinite;
        transform: translateX(-100%);
    }

    @keyframes shimmer {
        100% { transform: translateX(100%); }
    }
</style>
</head>

<body>

<div class="container">
    <div class="logo-container">
        <!-- 🔥 YOUR LOGO HERE -->
        <img src="https://i.ibb.co/67Tcn3S8/IMG-20251216-151652.png" class="logo" alt="ASIR NET Logo">
    </div>

    <div class="title">ASIR NET</div>
    <div class="subtitle">System Initialization</div>

    <div class="status-wrapper">
        <div class="dot" id="status-dot"></div>
        <div class="status" id="status">Checking network...</div>
    </div>

    <div class="bar-container">
        <div class="progress" id="progress"></div>
    </div>
</div>

<script>
// Target endpoints to hit
const endpoints = [
    "https://users-server-xyvg.onrender.com/get/users",
    "https://posts-server-kmha.onrender.com/get/posts",
    "https://interacts-server-xpbo.onrender.com/get/interact",
    "https://story-server-9d2k.onrender.com/get/story",
    "https://connection-server-9bzk.onrender.com/get/connection"
];

const progressBar = document.getElementById("progress");
const statusText = document.getElementById("status");
const statusDot = document.getElementById("status-dot");

function updateState(percent, text) {
    progressBar.style.width = percent + "%";
    statusText.innerText = text;
}

function handleFailure(errorMsg) {
    statusDot.style.backgroundColor = "#ef4444"; // Red color
    statusDot.style.animation = "none";
    progressBar.style.background = "#ef4444";
    progressBar.style.boxShadow = "0 0 10px rgba(239, 68, 68, 0.6)";
    updateState(100, errorMsg);
}

async function bootSequence() {
    try {
        // Step 1: Internet Check
        if (!navigator.onLine) {
            handleFailure("No Internet Connection ❌");
            return;
        }

        updateState(15, "Connecting to ASIR NET servers...");
        await new Promise(r => setTimeout(r, 600));

        // Step 2: Hitting Server Endpoints sequentially/simultaneously 
        updateState(40, "Fetching secure gateway data...");
        
        // Executes all fetch requests at the same time for extreme performance
        const responses = await Promise.all(
            endpoints.map(url => fetch(url))
        );

        // Verify if all servers responded with HTTP 200 OK
        const allOk = responses.every(res => res.ok);
        if (!allOk) {
            handleFailure("Server responded with error ❌");
            return;
        }

        // Step 3: Finalizing Setup
        updateState(85, "Resolving interface assets...");
        await new Promise(r => setTimeout(r, 600));

        // Step 4: Success state
        updateState(100, "Welcome to ASIR NET");
        statusDot.style.backgroundColor = "#22c55e"; // Green color
        statusDot.style.animation = "none";

        // Step 5: Secure Redirect
        setTimeout(() => {
            window.location.replace("asirnet.html");
        }, 1200);

    } catch (err) {
        handleFailure("Server Connection Error ❌");
        console.error("Boot Critical Error:", err);
    }
}

// Fire when document is ready
window.onload = bootSequence;
</script>

</body>
</html>
