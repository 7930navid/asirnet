<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AsirNet Profile Edit</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<meta name="google-site-verification" content="M1DXFU2LNfieXgRpYvEAl0C2fKAO-JJkjeldRbH6UTA" />
<link rel="icon" href="https://i.ibb.co.com/ccMxvp0S/asirnet-link-logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#edf2f7,#d7e1ec);
    min-height:100vh;
    padding:20px;
    padding-top:120px;
    overflow-x:hidden;
}

/* =========================
HEADER
========================= */

#header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(15px);
    z-index:99999;
    border-bottom:1px solid rgba(255,255,255,.5);
    box-shadow:0 8px 30px rgba(0,0,0,.08);
}

#header img{
    width:180px;
    border-radius:15px;
}

#header button{
    width:55px;
    height:55px;
    border:none;
    border-radius:15px;
    font-size:30px;
    cursor:pointer;
    background:white;
    color:red;
    transition:.4s;
}

#header button:hover{
    transform:rotate(180deg);
}

/* =========================
CONTAINER
========================= */

.container{
    max-width:760px;
    margin:auto;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(15px);
    border-radius:35px;
    padding:35px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.section{
    margin-bottom:30px;
}

.section h3{
    margin-bottom:10px;
    font-size:22px;
    color:#222;
}

hr{
    margin-bottom:15px;
    border:none;
    height:2px;
    background:linear-gradient(to right,#00c853,#64dd17);
    border-radius:20px;
}

input,
textarea{
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    font-size:16px;
    background:rgba(255,255,255,.9);
    box-shadow:0 5px 15px rgba(0,0,0,.05);
    transition:.3s;
}

textarea{
    min-height:120px;
    resize:none;
}

input:focus,
textarea:focus{
    outline:none;
    transform:scale(1.02);
    box-shadow:0 0 20px rgba(0,200,83,.25);
}

/* =========================
SELECT BOX
========================= */

.selectBox{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:rgba(255,255,255,.8);
    padding:15px 20px;
    border-radius:20px;
    cursor:pointer;
    transition:.35s;
    box-shadow:0 8px 20px rgba(0,0,0,.05);
}

.selectBox:hover{
    transform:translateY(-4px);
}

.selectPreview{
    display:flex;
    align-items:center;
    gap:15px;
    font-size:18px;
}

.selectPreview img{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:18px;
}

.selectBtn{
    width:60px;
    height:60px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    font-size:22px;
    color:white;
    background:linear-gradient(135deg,#00c853,#64dd17);
}

/* =========================
BUTTONS
========================= */

.buttonArea{
    display:flex;
    justify-content:flex-end;
    gap:20px;
    margin-top:30px;
}

.mainBtn{
    padding:18px 35px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    color:white;
    transition:.35s;
}

#submit{
    background:linear-gradient(135deg,#00c853,#64dd17);
}

#delete{
    background:linear-gradient(135deg,#ff1744,#ff5252);
}

.mainBtn:hover{
    transform:translateY(-5px) scale(1.05);
}

/* =========================
BOTTOM SHEET
========================= */

.bottomSheet{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(8px);
    display:none;
    justify-content:center;
    align-items:flex-end;
    z-index:999999;
}

.bottomSheet.show{
    display:flex;
}

.sheetContent{
    width:100%;
    max-width:950px;
    background:white;
    border-radius:35px 35px 0 0;
    padding:25px;
    max-height:85vh;
    overflow:auto;
    animation:slideUp .45s ease;
}

@keyframes slideUp{
    from{
        transform:translateY(100%);
    }
    to{
        transform:translateY(0);
    }
}

.sheetTop{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
}

.sheetTop button{
    width:50px;
    height:50px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

/* =========================
GRID
========================= */

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(130px,1fr));
    gap:20px;
}

.grid button{
    border:none;
    border-radius:22px;
    overflow:hidden;
    cursor:pointer;
    padding:8px;
    background:rgba(255,255,255,.8);
    transition:.35s;
    height:130px;
}

.grid button:hover{
    transform:translateY(-7px) scale(1.03);
}

.grid img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:18px;
}

/* =========================
MODAL
========================= */

#modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999999;
}

.modalContent{
    width:90%;
    max-width:500px;
    background:white;
    border-radius:25px;
    padding:30px;
    animation:fadeIn .4s ease;
}

.modalContent button{
    margin-top:20px;
    padding:15px 25px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#00c853,#64dd17);
    color:white;
    cursor:pointer;
}

/* =========================
LOADER
========================= */

#loader{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(10px);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:20px;
    z-index:9999999;
}

.spinner{
    width:70px;
    height:70px;
    border:6px solid rgba(255,255,255,.2);
    border-top:6px solid #00c853;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

#loaderText{
    color:white;
    font-size:18px;
}

.alert{
    margin-top:12px;
    color:red;
}

</style>
</head>

<body>

<!-- HEADER -->

<div id="header">

<img src="https://i.ibb.co/wNpFN8qH/IMG-20251103-150220.jpg">

<a href="/AsirNet.html">
<button>×</button>
</a>

</div>

<!-- LOADER -->

<div id="loader">

<div class="spinner"></div>

<div id="loaderText">
Loading...
</div>

</div>

<!-- CONTAINER -->

<div class="container">

<div class="section">

<h3>Your New Name</h3>
<hr>

<input
type="text"
id="username"
placeholder="Enter your name..."
>

</div>

<div class="section">

<h3>Your New Focus</h3>
<hr>

<textarea
id="bio"
placeholder="Add your focus..."
></textarea>

</div>

<div class="section">

<h3>Select Avatar</h3>
<hr>

<div
class="selectBox"
onclick="openAvatarSheet()"
>

<div
class="selectPreview"
id="avatarPreview"
>

Choose Avatar

</div>

<button class="selectBtn">
🖼
</button>

</div>

</div>

<div class="section">

<h3>Select Cover Theme</h3>
<hr>

<div
class="selectBox"
onclick="openThemeSheet()"
>

<div
class="selectPreview"
id="themePreview"
>

Choose Theme

</div>

<button class="selectBtn">
🎨
</button>

</div>

</div>

<div class="buttonArea">

<button
class="mainBtn"
id="delete"
>
Delete
</button>

<button
class="mainBtn"
id="submit"
>
Update Profile
</button>

</div>

</div>

<!-- AVATAR SHEET -->

<div
class="bottomSheet"
id="avatarSheet"
>

<div class="sheetContent">

<div class="sheetTop">

<h2>Select Avatar</h2>

<button onclick="closeAvatarSheet()">
✕
</button>

</div>

<div
class="grid"
id="avatarGrid"
></div>

</div>

</div>

<!-- THEME SHEET -->

<div
class="bottomSheet"
id="themeSheet"
>

<div class="sheetContent">

<div class="sheetTop">

<h2>Select Theme</h2>

<button onclick="closeThemeSheet()">
✕
</button>

</div>

<div
class="grid"
id="themeGrid"
></div>

</div>

</div>

<!-- PASSWORD MODAL -->

<div id="modal">

<div class="modalContent">

<h2>Password Verification</h2>

<br>

<input
type="password"
id="checkPassword"
placeholder="Enter password..."
>

<div
id="alert"
class="alert"
></div>

<button onclick="authenticationCheck()">
Verify
</button>

</div>

</div>

<script>

/* =========================
SERVERS WAKEUP
========================= */

async function wakeServers(){

    try{

        await Promise.all([

            fetch(
                "https://sett-serve.onrender.com/avatar"
            ),

            fetch(
                "https://users-server-xyvg.onrender.com"
            )

        ]);

    }catch(err){

        console.log(err);

    }

}

/* =========================
VARIABLES
========================= */

let avatars = [];
let themes = [];

let selectedAvatar = "";
let selectedTheme = "";

const token =
localStorage.getItem("token");

const user =
JSON.parse(
    localStorage.getItem("user")
);

/* =========================
LOADER
========================= */

function showLoader(text="Loading..."){

    document
    .getElementById("loader")
    .style.display = "flex";

    document
    .getElementById("loaderText")
    .innerText = text;

}

function hideLoader(){

    document
    .getElementById("loader")
    .style.display = "none";

}

/* =========================
AUTH CHECK
========================= */

async function authenticationCheck(){

    const password =
    document
    .getElementById(
        "checkPassword"
    )
    .value;

    const alertBox =
    document
    .getElementById(
        "alert"
    );

    showLoader("Verifying...");

    try{

        const response =
        await fetch(
            "https://users-server-xyvg.onrender.com/signin",
            {
                method:"POST",

                headers:{
                    "Content-Type":
                    "application/json"
                },

                body:JSON.stringify({

                    email:user.email,
                    password

                })

            }
        );

        const data =
        await response.json();

        hideLoader();

        if(!response.ok){

            alertBox.innerHTML =
            "❌ Wrong Password";

            return;

        }

        localStorage.setItem(
            "token",
            data.token
        );

        localStorage.setItem(
            "user",
            JSON.stringify(data.user)
        );

        alertBox.style.color =
        "green";

        alertBox.innerHTML =
        "✅ Verified";

        setTimeout(()=>{

            document
            .getElementById(
                "modal"
            )
            .style.display =
            "none";

        },1000);

    }

    catch(err){

        hideLoader();

        alertBox.innerHTML =
        "❌ Server Error";

    }

}

/* =========================
LOAD AVATARS
========================= */

async function loadAvatars(){

    try{

        const res =
        await fetch(
            "https://sett-serve.onrender.com/avatar"
        );

        const data =
        await res.json();
        
        avatars =
        data.map(
            item => item.avatar
        );

        renderAvatars();

    }catch(err){

        console.log(err);

    }

}

/* =========================
LOAD THEMES
========================= */

async function loadThemes(){

    try{

        const res =
        await fetch(
            "https://sett-serve.onrender.com/themes"
        );

        const data =
        await res.json();

        themes =
        data.map(
            item => item.img
        );

        renderThemes();

    }catch(err){

        console.log(err);

    }

}

/* =========================
RENDER AVATARS
========================= */

function renderAvatars(){

    const grid =
    document
    .getElementById(
        "avatarGrid"
    );

    grid.innerHTML = "";

    avatars.forEach(url=>{

        const btn =
        document.createElement(
            "button"
        );

        btn.innerHTML = `
        <img src="${url}">
        `;

        btn.onclick = ()=>{

            selectedAvatar = url;

            document
            .getElementById(
                "avatarPreview"
            )
            .innerHTML = `
            <img src="${url}">
            <div>Avatar Selected</div>
            `;

            closeAvatarSheet();

        };

        grid.appendChild(btn);

    });

}

/* =========================
RENDER THEMES
========================= */

function renderThemes(){

    const grid =
    document
    .getElementById(
        "themeGrid"
    );

    grid.innerHTML = "";

    themes.forEach(url=>{

        const btn =
        document.createElement(
            "button"
        );

        btn.innerHTML = `
        <img src="${url}">
        `;

        btn.onclick = ()=>{

            selectedTheme = url;

            document
            .getElementById(
                "themePreview"
            )
            .innerHTML = `
            <img src="${url}">
            <div>Theme Selected</div>
            `;

            closeThemeSheet();

        };

        grid.appendChild(btn);

    });

}

/* =========================
OPEN CLOSE SHEETS
========================= */

function openAvatarSheet(){

    document
    .getElementById(
        "avatarSheet"
    )
    .classList.add("show");

}

function closeAvatarSheet(){

    document
    .getElementById(
        "avatarSheet"
    )
    .classList.remove("show");

}

function openThemeSheet(){

    document
    .getElementById(
        "themeSheet"
    )
    .classList.add("show");

}

function closeThemeSheet(){

    document
    .getElementById(
        "themeSheet"
    )
    .classList.remove("show");

}

/* =========================
LOAD CURRENT USER
========================= */

function loadCurrentUser(){

    if(!user) return;

    document
    .getElementById(
        "username"
    )
    .value =
    user.username || "";

    document
    .getElementById(
        "bio"
    )
    .value =
    user.bio || "";

    if(user.avatar){

        selectedAvatar =
        user.avatar;

        document
        .getElementById(
            "avatarPreview"
        )
        .innerHTML = `
        <img src="${user.avatar}">
        <div>Current Avatar</div>
        `;

    }

    if(user.cover_photo){

        selectedTheme =
        user.cover_photo;

        document
        .getElementById(
            "themePreview"
        )
        .innerHTML = `
        <img src="${user.cover_photo}">
        <div>Current Theme</div>
        `;

    }

}

/* =========================
UPDATE PROFILE
========================= */

document
.getElementById(
    "submit"
)
.onclick =
async function(){

    const username =
    document
    .getElementById(
        "username"
    )
    .value.trim();

    const bio =
    document
    .getElementById(
        "bio"
    )
    .value.trim();

    if(!username){

        alert("Username required");
        return;

    }

    showLoader(
        "Updating profile..."
    );

    try{

        const response =
        await fetch(
            "https://users-server-xyvg.onrender.com/profile",
            {
                method:"PUT",

                headers:{
                    "Content-Type":
                    "application/json",

                    Authorization:
                    "Bearer " + token
                },

                body:JSON.stringify({

                    username,
                    bio,

                    avatar:
                    selectedAvatar,

                    cover_photo:
                    selectedTheme

                })

            }
        );

        const data =
        await response.json();

        hideLoader();

        if(!response.ok){

            alert(
                data.message ||
                "Update failed"
            );

            return;

        }

        localStorage.setItem(
            "user",
            JSON.stringify(data)
        );

        this.innerHTML =
        "Updated ✅";

        setTimeout(()=>{

            this.innerHTML =
            "Update Profile";

        },2000);

    }

    catch(err){

        hideLoader();

        alert(
            "Server error"
        );

    }

};

/* =========================
DELETE ACCOUNT
========================= */

document
.getElementById(
    "delete"
)
.onclick = ()=>{

/* =========================
DELETE ACCOUNT
========================= */

document
.getElementById(
    "delete"
)
.onclick =
async function(){

    const confirmDelete =
    confirm(
        "Are you sure you want to delete your account?"
    );

    if(!confirmDelete) return;

    showLoader(
        "Deleting account..."
    );

    try{

        const response =
        await fetch(
            "https://users-server-xyvg.onrender.com/delete-account",
            {
                method:"DELETE",

                headers:{
                    Authorization:
                    "Bearer " + token
                }
            }
        );

        const data =
        await response.json();

        hideLoader();

        if(!response.ok){

            alert(
                data.message ||
                "Delete failed"
            );

            return;

        }

        /* CLEAR STORAGE */

        localStorage.removeItem(
            "token"
        );

        localStorage.removeItem(
            "user"
        );

        alert(
            "Account deleted successfully"
        );

        /* REDIRECT */

        location.href =
        "login.html";

    }

    catch(err){

        hideLoader();

        alert(
            "Server error"
        );

        console.log(err);

    }

};
};

/* =========================
INIT
========================= */

(async ()=>{

    showLoader(
        "Waking servers..."
    );

    await wakeServers();

    await loadAvatars();

    await loadThemes();

    loadCurrentUser();

    hideLoader();

})();

</script>

</body>
</html>
