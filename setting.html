<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsirNet Settings</title>

<meta name="google-site-verification" content="M1DXFU2LNfieXgRpYvEAl0C2fKAO-JJkjeldRbH6UTA" />
<link rel="icon" href="https://i.ibb.co.com/ccMxvp0S/asirnet-link-logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

body{
    background:#f5f7fb;
    padding:20px;
}

.settings-container{
    max-width:900px;
    margin:auto;
}

/* Header */

#settings-header{
    border-radius:24px;
    padding:24px;
    display:flex;
    align-items:center;
    gap:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.06);

    margin-bottom:20px;
}

.profile-pic{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;

    border:4px solid #8b5cf6;
}

.profile-info h2{
    color:#111827;
}

.profile-info p{
    color:#6b7280;
    margin-top:4px;
}

/* Sections */

.section-title{
    margin:25px 0 15px;
    color:#374151;
    font-size:18px;
    font-weight:700;
}

.settings-grid{
    display:grid;
    gap:15px;
}

/* Cards */

.setting-card{
    background:white;
    border-radius:18px;

    padding:18px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    box-shadow:
    0 4px 15px rgba(0,0,0,.05);

    transition:
    .3s ease;
}

.setting-card:hover{
    transform:translateY(-4px);

    box-shadow:
    0 15px 30px rgba(0,0,0,.08);
}

.setting-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.setting-icon{
    width:50px;
    height:50px;

    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #6366f1
    );

    color:white;
}

.setting-text h4{
    color:#111827;
}

.setting-text p{
    color:#6b7280;
    font-size:13px;
}

/* Toggle */

.switch{
    position:relative;
    width:54px;
    height:30px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;

    background:#d1d5db;
    border-radius:50px;

    cursor:pointer;
    transition:.3s;
}

.slider:before{
    content:"";

    position:absolute;
    width:24px;
    height:24px;

    left:3px;
    top:3px;

    border-radius:50%;
    background:white;

    transition:.3s;
}

input:checked + .slider{
    background:#8b5cf6;
}

input:checked + .slider:before{
    transform:translateX(24px);
}

/* Logout */

.logout-btn{
    width:100%;
    margin-top:25px;

    border:none;
    border-radius:18px;

    padding:16px;

    font-size:16px;
    font-weight:700;

    cursor:pointer;

    color:white;

    background:
    linear-gradient(
    135deg,
    #ef4444,
    #dc2626
    );

    transition:.3s;
}

.logout-btn:hover{
    transform: translateY(-3px);
    box-shadow:
    0 12px 25px rgba(239,68,68,.25);
}

#confirm {
    position: fixed;
    height: 100%;
    width: 100%;
    z-index: 999;
    left: 0;
    top: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    opacity: 0;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    transform: translateY(300px);
    transition: visibility 0.4s ease,
                opacity 0.4s ease,
                transform 0.4s ease;
}

#confirm.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

#confirm section {
    background: rgb(250,250,255);
    border: 3px solid white;
    width: 300px;
    border-radius: 10px;
    padding: 10px;
}

#confirm div {
    background: white;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 0 15px lightgray;
    color: red;
    font-weight: bold;
    font-size: 18px;
}

#cancelBtn, #okBtn {
    border: none;
    background: white;
    width: 41%;
    margin: 10px;
    padding: 10px;
    border-radius: 20px;
    box-shadow: 0 0 15px lightgray;
    font-weight: bold;
    color: white;
}

</style>
</head>
<body>

<div class="settings-container">

    <div id="settings-header">

        <img
        class="profile-pic"
        id="profPic">

        <div class="profile-info">
            <h2 id="uName"></h2>
            <p id="uBio"></p>
        </div>

    </div>

    <div class="section-title">
        Preferences
    </div>

    <div class="settings-grid">

        <div class="setting-card">

            <div class="setting-left">
                <div class="setting-icon">🌙</div>

                <div class="setting-text">
                    <h4>Dark Mode</h4>
                    <p>Enable dark appearance</p>
                </div>
            </div>

            <label class="switch">
                <input type="checkbox" onchange="darkM(this)" id="darkM">
                <span class="slider"></span>
            </label>

        </div>

        <div class="setting-card">

            <div class="setting-left">
                <div class="setting-icon">🔔</div>

                <div class="setting-text">
                    <h4>Notifications</h4>
                    <p>Receive important alerts</p>
                </div>
            </div>

            <label class="switch">
                <input type="checkbox" checked onchange="notify(this)" id="notif">
                <span class="slider"></span>
            </label>

        </div>

        <div class="setting-card">

            <div class="setting-left">
                <div class="setting-icon">🔒</div>

                <div class="setting-text">
                    <h4>Privacy</h4>
                    <p>Manage account privacy</p>
                </div>
            </div>

            ➜

        </div>

        <div class="setting-card">

            <div class="setting-left">
                <div class="setting-icon">ℹ️</div>

                <div class="setting-text">
                    <h4>About</h4>
                    <p>About AsirNet</p>
                </div>
            </div>

            ➜

        </div>

    </div>

   <button class="logout-btn" onclick="logOut()">
        Logout
    </button>

</div>

<div id="confirm">
  <section>
  <div>
      testing
  </div>
  <button id="cancelBtn" style="background: red;" onclick="closeConfirm()">Cancel</button>
  <button id="okBtn" style="background: blue;">OK</button>
  </section>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));

document.getElementById('profPic').src = user.avatar;
document.getElementById('uName').innerText = user.username;
document.getElementById('uBio').innerText = user.bio;
document.getElementById('settings-header').style.background = "url(user.cover_photo)";

 
const dark = localStorage.getItem('dark') === 'true';
const notif = localStorage.getItem('notify') === 'true';
document.querySelector('#darkM').checked = dark;
document.querySelector('#notif').checked = notif;


function darkM(el) {
    localStorage.setItem('dark', el.checked);
    }
    

function notify(el) {
    localStorage.setItem('notify', el.checked);
    }

function inconfirm(warn, func) {

    const el = document.querySelector('#confirm');
    const okBtn = document.querySelector('#okBtn');

    el.classList.add('show');

    okBtn.onclick = () => {
        closeConfirm();

        if (typeof func === 'function') {
            func();
        }
    };
}

function closeConfirm() {
    document.querySelector('#confirm').classList.remove('show');
}

function logOut() {
    inconfirm('Do you want to log out?', logged);
}

function logged() {
    if(confirm('Do you want to Log out ?')) {
        localStorage.removeItem("user");
        alert("Logged out!");
        location.href = "sign_in.html";
    
}
}

</script>

</body>
</html>
