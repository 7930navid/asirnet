<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AsirNet Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<meta name="google-site-verification" content="M1DXFU2LNfieXgRpYvEAl0C2fKAO-JJkjeldRbH6UTA" />
<link rel="icon" href="https://i.ibb.co.com/ccMxvp0S/asirnet-link-logo.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at top left,#0f172a,#020617 60%);
    position:relative;
}

/* Animated background glow */
body::before,
body::after{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(90px);
    animation:float 8s ease-in-out infinite;
}

body::before{
    background:#00f7ff;
    top:-150px;
    left:-120px;
}

body::after{
    background:#7c3aed;
    bottom:-150px;
    right:-120px;
    animation-delay:4s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(30px);
    }
}

/* Login Card */

.login-box{
    width:380px;
    padding:45px 35px;
    border-radius:28px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:
    0 0 40px rgba(0,0,0,0.4),
    inset 0 0 20px rgba(255,255,255,0.03);
    position:relative;
    z-index:10;
    overflow:hidden;
    animation:cardShow 1s ease;
}

@keyframes cardShow{
    from{
        opacity:0;
        transform:translateY(40px) scale(.95);
    }
    to{
        opacity:1;
        transform:translateY(0px) scale(1);
    }
}

.login-box::before{
    content:'';
    position:absolute;
    width:180px;
    height:180px;
    background:linear-gradient(45deg,#00f7ff,#7c3aed);
    border-radius:50%;
    top:-90px;
    right:-90px;
    opacity:.25;
}

.logo{
    color:#fff;
    text-align:center;
    margin-bottom:35px;
}

.logo h1{
    font-size:38px;
    font-weight:700;
    letter-spacing:1px;
}

.logo span{
    color:#00f7ff;
}

.logo p{
    margin-top:8px;
    color:#b8c1d9;
    font-size:14px;
}

/* Inputs */

.input-group{
    position:relative;
    margin-bottom:28px;
}

.input-group input{
    width:100%;
    padding:16px 18px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    outline:none;
    border-radius:14px;
    color:#fff;
    font-size:15px;
    transition:.35s ease;
}

.input-group input:focus{
    border-color:#00f7ff;
    box-shadow:
    0 0 15px rgba(0,247,255,.35);
    transform:translateY(-2px);
}

.input-group label{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
    pointer-events:none;
    transition:.3s;
    background:transparent;
}

.input-group input:focus + label,
.input-group input:valid + label{
    top:-10px;
    left:14px;
    font-size:12px;
    padding:0 6px;
    color:#00f7ff;
    background:#0f172a;
    border-radius:6px;
}

/* Button */

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#00f7ff,#7c3aed);
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.35s ease;
    position:relative;
    overflow:hidden;
}

.login-btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.2);
    transform:skewX(-25deg);
    transition:.6s;
}

.login-btn:hover::before{
    left:120%;
}

.login-btn:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:
    0 12px 25px rgba(124,58,237,.4),
    0 0 20px rgba(0,247,255,.35);
}

.login-btn:active{
    transform:scale(.98);
}

/* Bottom text */

.bottom-text{
    text-align:center;
    margin-top:24px;
    color:#94a3b8;
    font-size:13px;
}

.bottom-text span{
    color:#00f7ff;
}

/* Responsive */

@media(max-width:450px){
    .login-box{
        width:92%;
        padding:40px 25px;
    }

    .logo h1{
        font-size:32px;
    }
}

section {
    padding-top: 20px;
}
section button {
    background: none;
    border: none;
    color: red;
    font-size: 15px;
    padding: 0;
}
section button:focus {
    outline: none;

    color: #00e5ff;

    transform: translateY(-2px);

    text-shadow:
        0 0 10px rgba(0,229,255,0.6),
        0 0 20px rgba(124,58,237,0.4);

    position: relative;
}

section button:focus::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 100%;
    height: 2px;

    background: linear-gradient(90deg, #00e5ff, #7c3aed);
    border-radius: 10px;

    animation: underlineGlow 0.4s ease forwards;
}

@keyframes underlineGlow {
    from {
        transform: scaleX(0);
        opacity: 0;
    }
    to {
        transform: scaleX(1);
        opacity: 1;
    }
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <h1>Asir<span>Net</span></h1>
        <p>Secure Premium Access</p>
    </div>

    <form>

        <div class="input-group">
            <input type="email" required>
            <label>Email Address</label>
        </div>

        <div class="input-group">
            <input type="password" required>
            <label>Passkey</label>
        </div>
        

        <button class="login-btn">
            Login
        </button>

    </form>
            <section>
         <button onclick="forgot()">Forgot password?</button>
         <a href="register.html"><button>Create a new account?</button></a>
        </section>

    <div class="bottom-text">
        Protected by <span>AsirNet Security</span>
    </div>

</div>

</body>
<script>

const form = document.querySelector("form");
const loginBtn = document.querySelector(".login-btn");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.querySelector('input[type="email"]').value.trim();
    const password = document.querySelector('input[type="password"]').value.trim();

    if (!email || !password) {
        alert("Please fill all fields");
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerText = "Authenticating...";

    try {
        const res = await fetch("https://users-server-xyvg.onrender.com/signin", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.message || "Login failed");

            loginBtn.disabled = false;
            loginBtn.innerText = "Login";
            return;
        }

        // 🔐 SAVE TOKEN (MOST IMPORTANT)
        localStorage.setItem("token", data.token);

        // 🔐 SAFE USER SAVE (NO PASSWORD)
        const user = {
            id: data.user.id,
            username: data.user.username,
            email: data.user.email,
            bio: data.user.bio,
            avatar: data.user.avatar,
            cover_photo: data.user.cover_photo
        };

        localStorage.setItem("user", JSON.stringify(user));

        loginBtn.innerText = "Success ✓";

        alert("Login successful!");

        // redirect
        setTimeout(() => {
            window.location.href = "asirnet.html";
        }, 800);

    } catch (err) {
        console.error(err);

        alert("Network / server error");

        loginBtn.disabled = false;
        loginBtn.innerText = "Login";
    }
});


async function forgot() {
  const email = document.querySelector('input[type="email"]').value.trim();

  if (!email) {
    alert("Enter email first");
    return;
  }

  try {
    const res = await fetch("https://users-server-xyvg.onrender.com/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    console.log("::forgot 1st");
    const data = await res.json();
    console.log("::forgot 2nd");
    console.log(data + "::forgot");

    alert(data.message || "Check your email");
  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}

function getToken() {
  return new URLSearchParams(window.location.search).get("token");
}

async function resetPassword() {
  const token = getToken();
  const newPassword = document.querySelector("#newPassword").value;

  if (!newPassword) {
    alert("Enter new password");
    return;
  }

  try {
    const res = await fetch("https://users-server-xyvg.onrender.com/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token,
        newPassword
      })
    });

    console.log("::reset 1st");
    const data = await res.json();
    console.log("::reset 2nd");
    console.log(data + "::reset");

    alert(data.message);

    if (res.ok) {
      window.location.href = "login.html";
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
}

</script>
</html>
