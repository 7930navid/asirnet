<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsirNet Notifications</title>

<meta name="google-site-verification" content="M1DXFU2LNfieXgRpYvEAl0C2fKAO-JJkjeldRbH6UTA" />
<link rel="icon" href="https://i.ibb.co.com/ccMxvp0S/asirnet-link-logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

#loader{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.95);
    backdrop-filter:blur(15px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner{
    width:70px;
    height:70px;
    border:5px solid rgba(255,255,255,.15);
    border-top:5px solid #00e676;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

.loading-text{
    color:white;
    margin-top:15px;
    font-size:18px;
    font-weight:600;
}

.container{
    width:100%;
    max-width:850px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:700;
}

.badge{
    background:#ff4757;
    color:white;
    padding:8px 16px;
    border-radius:30px;
    font-weight:600;
}

.notifications{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.notification{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:18px;
    padding:18px;
    display:flex;
    gap:15px;
    transition:.3s;
}

.notification:hover{
    transform:translateY(-3px);
}

.icon{
    width:55px;
    height:55px;
    min-width:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    font-size:22px;
}

.content{
    flex:1;
}

.content h3{
    color:white;
    margin-bottom:5px;
}

.content p{
    color:#cbd5e1;
    margin-bottom:12px;
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-weight:600;
}

.accept{
    background:#00e676;
}

.deny{
    background:#ff4757;
}

.empty{
    color:white;
    text-align:center;
    margin-top:50px;
    font-size:18px;
}

@media(max-width:600px){

    .notification{
        flex-direction:column;
    }

    .buttons{
        flex-wrap:wrap;
    }

}

</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div class="loading-text">Loading Requests...</div>
</div>

<div class="container" id="display"></div>

<script>

const display = document.getElementById("display");
const loader = document.getElementById("loader");

function showLoader(){
    loader.style.display = "flex";
}

function hideLoader(){
    loader.style.display = "none";
}

loadConnections();

async function loadConnections(){

    showLoader();

    try{

        const user = JSON.parse(localStorage.getItem("user"));
        const token = localStorage.getItem("token");

        if(!user || !user.email){
            throw new Error("Login required");
        }

        const email = user.email;

        // CHANGE URL
        const res = await fetch(
            `https://connection-server-9bzk.onrender.com/connections/${encodeURIComponent(email)}`
        );

        const data = await res.json();

        if(!data.success){
            throw new Error("Failed to load requests");
        }

        const requests = await Promise.all(

            data.data.map(async(req)=>{

                let username = req.sender_id;

                try{

                    // CHANGE URL
                    const userRes = await fetch(
                        `https://users-server-xyvg.onrender.com/me?email=${encodeURIComponent(req.sender_id)}`,
                        {
                            headers:{
                                Authorization:`Bearer ${token}`
                            }
                        }
                    );

                    if(userRes.ok){

                        const userData = await userRes.json();

                        username =
                            userData.username ||
                            req.sender_id;

                    }

                }catch(err){
                    console.error(err);
                }

                return {
                    ...req,
                    username
                };

            })

        );

        let html = `
        <div class="header">
            <div class="logo">🧩 Connection Requests</div>
            <div class="badge">${requests.length}</div>
        </div>

        <div class="notifications">
        `;

        if(requests.length === 0){

            html += `
                <div class="empty">
                    No Pending Requests
                </div>
            `;

        }

        requests.forEach(req=>{

            html += `
            <div class="notification">

                <div class="icon">
                    🤝
                </div>

                <div class="content">

                    <h3>${req.username}</h3>

                    <p>${req.sender_id}</p>

                    <div class="buttons">

                        <button
                            class="accept"
                            onclick="acceptConnection('${req.id}')"
                        >
                            Connect
                        </button>

                        <button
                            class="deny"
                            onclick="denyConnection('${req.id}')"
                        >
                            Deny
                        </button>

                    </div>

                </div>

            </div>
            `;

        });

        html += `</div>`;

        display.innerHTML = html;

    }catch(err){

        console.error(err);

        display.innerHTML = `
        <div class="empty">
            ${err.message}
        </div>
        `;

    }finally{

        hideLoader();

    }

}

async function acceptConnection(id){

    try{

        // CHANGE URL
        const res = await fetch(
            `https://connection-server-9bzk.onrender.com/connections/${id}`,
            {
                method:"PUT",
                headers:{
                    "Content-Type":"application/json"
                }
            }
        );

        const data = await res.json();

        if(data.success){
            loadConnections();
        }

    }catch(err){

        alert(err.message);

    }

}

async function denyConnection(id){

    try{

        // CHANGE URL
        const res = await fetch(
            `https://connection-server-9bzk.onrender.com/connections/${id}`,
            {
                method:"DELETE"
            }
        );

        const data = await res.json();

        if(data.success){
            loadConnections();
        }

    }catch(err){

        alert(err.message);

    }

}

</script>

</body>
</html>
